name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  auditor-tests:
    name: Auditor · compile + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      # The suite is stdlib-only; the ClickHouse-dependent test self-skips without the driver,
      # so no pip install is needed (fast). compileall catches syntax errors in every module.
      - name: Byte-compile auditor
        run: python -m compileall auditor
      - name: Run unit tests
        run: python -m unittest discover -s auditor/tests -t . -v

  ui-build:
    name: UI · typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11   # match the lockfile's generator (pnpm 10/11 ignore the legacy pnpm.overrides field)
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm exec tsc --noEmit
      - name: Build
        run: pnpm build
