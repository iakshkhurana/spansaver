# SpanSaver stack — SigNoz itself runs from its own official compose, separately.
# We JOIN its docker network so our collector reaches SigNoz ingest, and (D2) the auditor
# reaches ClickHouse + the SigNoz API by service name.
# BEFORE `make up`: confirm the network name (`docker network ls`) and set
# SIGNOZ_DOCKER_NETWORK in .env. D1 `make up` starts collector + orders + payments + askdocs;
# auditor + ui are behind the "full" profile (D2/D3).

services:
  collector:
    build: ./collector                      # otelcol-contrib + entrypoint that merges patches
    env_file: .env                          # provides SIGNOZ_COLLECTOR_OTLP_ENDPOINT
    extra_hosts:
      - "host.docker.internal:host-gateway" # reach SigNoz's host-published OTLP port
    command: ["--config=/etc/otelcol/merged.yaml"]
    volumes:
      - ./collector:/etc/otelcol            # baseline + merge_config.py + patches/ + merged.yaml
    # No host ports: victims reach us as `collector:4317` inside the shared network, and
    # SigNoz already publishes host 4317/4318 — publishing them here would clash.
    # entrypoint.sh runs merge_config.py on start (baseline + patches/*.yaml -> merged.yaml).
    # D2: auditor triggers re-merge + collector restart on apply/unapply.

  orders:
    build: ./victim-stack/orders
    env_file: .env
    environment: [ OTEL_SERVICE_NAME=orders ]
    ports: [ "8001:8000" ]
    depends_on: [ collector ]

  payments:
    build: ./victim-stack/payments
    env_file: .env
    environment: [ OTEL_SERVICE_NAME=payments ]
    ports: [ "8002:8000" ]
    depends_on: [ collector ]

  askdocs:
    build: ./victim-stack/askdocs
    env_file: .env
    environment: [ OTEL_SERVICE_NAME=askdocs ]
    ports: [ "8003:8000" ]
    depends_on: [ collector ]

  # auditor + ui land in D2/D3. They're behind the "full" profile so D1 `make up` builds
  # only what exists (collector + victims). Bring them up later with:
  #   docker compose --profile full up -d --build
  auditor:
    build: ./auditor
    profiles: [ "full" ]
    env_file: .env
    environment:
      # Reach the host-published SigNoz API from inside the container (localhost would be the
      # container itself). UI deep-links still use SIGNOZ_UI_URL=localhost for the browser.
      - SIGNOZ_API_URL=http://host.docker.internal:8080
      - COLLECTOR_DIR=/workspace/collector   # where fixgen writes patches (shared with collector)
      - COLLECTOR_CONTAINER=signoz-collector-1  # collector container to restart on apply (docker ps)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports: [ "8100:8100" ]
    volumes:
      - ./collector:/workspace/collector          # fixgen writes patches here (also mounted by collector)
      - /var/run/docker.sock:/var/run/docker.sock  # apply/unapply restarts the collector container
    # reaches ClickHouse + SigNoz API on the external signoz network (below)

  ui:
    build: ./ui
    profiles: [ "full" ]
    env_file: .env
    ports: [ "3000:3000" ]
    depends_on: [ auditor ]

networks:
  default:
    name: ${SIGNOZ_DOCKER_NETWORK:-signoz-net}
    external: true
# If joining the external network causes friction on D1, fall back to a local network +
# host-published SigNoz ports, and note it in SETUP.md. Working > pretty.
